<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f7fb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Guess Flags">
    <title>Guess Flags</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="homeScreen" class="screen screen-active" aria-labelledby="appTitle">
        <div class="hero">
          <span class="hero-icon" aria-hidden="true">🏳️</span>
          <h1 id="appTitle">Guess Flags</h1>
          <p>Learn flags, capitals, and continents offline.</p>
        </div>

        <label class="field-label" for="regionSelect">Region</label>
        <select id="regionSelect" class="select">
          <option>All</option>
          <option>Asia</option>
          <option>Europe</option>
          <option>Africa</option>
          <option>North America</option>
          <option>South America</option>
          <option>Oceania</option>
        </select>

        <label class="toggle-row" for="chineseModeToggle">
          <span>
            <strong>Chinese Mode</strong>
            <small>Accept Chinese names and show them in explanations.</small>
          </span>
          <input id="chineseModeToggle" type="checkbox">
        </label>

        <div class="button-stack">
          <button id="startButton" class="button button-primary" type="button">Start</button>
          <button id="dailyButton" class="button" type="button">Daily Challenge</button>
          <button id="statsButton" class="button" type="button">Statistics</button>
          <button id="mistakesButton" class="button" type="button">Mistakes</button>
        </div>
        <p id="dailyStatus" class="daily-status" hidden></p>
      </section>

      <section id="gameScreen" class="screen" aria-labelledby="gameTitle">
        <header class="top-bar">
          <button id="homeButton" class="icon-button" type="button" aria-label="Back to home">‹</button>
          <div>
            <h2 id="gameTitle">Guess the flag</h2>
            <p id="gameModeLabel">All countries</p>
          </div>
          <div class="score-pill" aria-live="polite">
            <span id="scoreText">0 / 0</span>
          </div>
        </header>

        <div class="flag-card" aria-live="polite">
          <div id="flagDisplay" class="flag">🏳️</div>
        </div>

        <form id="answerForm" class="answer-area" autocomplete="off">
          <label class="field-label" for="answerInput">Country name</label>
          <input id="answerInput" class="text-input" type="text" inputmode="text" placeholder="Type a country..." aria-describedby="suggestionsHelp">
          <p id="suggestionsHelp" class="sr-only">Suggestions appear below while typing.</p>
          <div id="suggestions" class="suggestions" role="listbox"></div>
          <button id="submitButton" class="button button-primary" type="submit">Submit</button>
        </form>

        <section id="studyPanel" class="study-panel" hidden>
          <p id="resultText" class="result-text"></p>
          <dl class="facts">
            <div>
              <dt>Country</dt>
              <dd id="factCountry"></dd>
            </div>
            <div>
              <dt>Capital</dt>
              <dd id="factCapital"></dd>
            </div>
            <div>
              <dt>Continent</dt>
              <dd id="factContinent"></dd>
            </div>
          </dl>
          <button id="nextButton" class="button" type="button">Next</button>
        </section>
      </section>

      <section id="statsScreen" class="screen" aria-labelledby="statsTitle">
        <header class="top-bar">
          <button class="icon-button back-home" type="button" aria-label="Back to home">‹</button>
          <div>
            <h2 id="statsTitle">Statistics</h2>
            <p>Your saved progress</p>
          </div>
        </header>
        <div id="statsContent" class="panel-list"></div>
      </section>

      <section id="mistakesScreen" class="screen" aria-labelledby="mistakesTitle">
        <header class="top-bar">
          <button class="icon-button back-home" type="button" aria-label="Back to home">‹</button>
          <div>
            <h2 id="mistakesTitle">Mistakes</h2>
            <p>Practice the flags that need another look.</p>
          </div>
        </header>
        <div id="mistakesContent" class="panel-list"></div>
        <button id="practiceMistakesButton" class="button button-primary" type="button">Practice mistakes</button>
        <button id="clearMistakesButton" class="button" type="button">Clear mistakes</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
